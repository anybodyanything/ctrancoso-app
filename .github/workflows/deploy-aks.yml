name: Deploy backend image to AKS

on:
  workflow_dispatch:
    inputs:
      env:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      image_ref:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}

    steps:
      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get credentials \
            --resource-group ${{ vars.Azure_RESOURCE_GROUP }}
            --name ${{ vars.AKS_CLUSTER_NAME }}

      - name: Update image
        run: |
          kubectl set image deployment/backend backend=${{ inputs.image_ref }}

      - name: Confirm rollout
        run: |
          kubectl rollout status deployment/backend