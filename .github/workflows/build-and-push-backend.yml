name: Build and push backend image

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment:'
        required: true
        type: choice
        options:
          - dev
          - prod
      deploy_aks:
        description: 'Deploy to AKS?'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag_setup.outputs.image_tag }}
      image_ref: ${{ steps.tag_setup.outputs.image_ref }}

    steps:
      - name: Checkout ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci
        working-directory: ./server

      - name: Run tests
        run: npm test
        working-directory: ./server

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        id: tag_setup
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BRANCH=${GITHUB_REF##*/}
          if [ "${{ inputs.environment }}" = "prod" ]; then
            IMAGE_TAG="latest"
          else
            IMAGE_TAG="${branch}-${SHORT_SHA}"
          fi

          IMAGE_REF="${{ vars.ACR_LOGIN_SERVER }}/backend:${IMAGE_TAG}"

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build image
        run: |
          docker build \
            -t ${{ steps.tag_setup.outputs.image_ref }} \
            ./server

      - name: Push image
        run: |
          docker push ${{ steps.tag_setup.outputs.image_ref }}

  deploy-aks:
    if: ${{ inputs.deploy_aks }}
    needs: build-and-push
    uses: ./.github/workflows/deploy-aks.yml
    with:
      environment: ${{ inputs.environment }}
      image_tag: ${{ needs.build-and-push.outputs.image_tag }}
      image_ref: ${{ needs.build-and-push.outputs.image_ref }}
    secrets: inherit