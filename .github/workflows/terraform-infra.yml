name: Terraform Infra

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment:"
        required: true
        type: choice
        options:
          - 'dev'
          - 'prod'
      apply:
        description: "Apply after plan?"
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform/envs/${{ inputs.env }}
        run: terraform init

      - name: Terraform plan
        working-directory: terraform/envs/${{ inputs.env }}
        run: terraform plan

  terraform-apply:
    if: ${{ inputs.apply }}
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment: approver

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform/envs/${{ inputs.env }}
        run: terraform init

      - name: Terraform apply
        working-directory: terraform/envs/${{ inputs.env }}
        run: terraform apply -auto-approve