services:
  db:
    image: postgres:16
    container_name: kiwauno
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kiwauno
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kiwauno"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  pgdata: