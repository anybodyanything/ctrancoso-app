version: "3.8"

services:
  db:
    image: postgres:14
    container_name: KU-postgres-local
    environment:
      POSTGRES_USER: pgadmin
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kiwauno-local-database
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgadmin -d kiwauno-local-database"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build: ./server
    container_name: KU-backend-local
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://pgadmin:postgres@db:5432/kiwauno-local-database
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    container_name: KU-frontend-local
    ports:
      - "3000:80"
    volumes:
      - ./client:/usr/share/nginx/html:ro

volumes:
  pgdata: